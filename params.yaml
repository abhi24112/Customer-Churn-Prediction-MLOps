data:
  test_size: 0.2
  random_state: 42

model:
  xgboost:
    model_status: true
    hpt_enabled: false
    params:
      objective: "binary:logistic"
      eval_metric: "logloss"
      n_estimators: 300
      learning_rate: 0.05
      max_depth: 4
      min_child_weight: 1
      subsample: 0.8
      colsample_bytree: 0.8
      n_jobs: -1
      tree_method: "hist"
      random_state: 42
      enable_categorical: true
      scale_pos_weight: 0.6

  catboost:
    model_status: true
    hpt_enabled: true
    params:
      loss_function: "Logloss"
      eval_metric: "AUC"
      iterations: 1000
      learning_rate: 0.05
      depth: 6
      random_seed: 42
      thread_count: -1
      verbose: false
      auto_class_weights: "Balanced"

  lightgbm:
    model_status: true
    hpt_enabled: false
    params:
      objective: "binary"
      metric: "binary_logloss"
      n_estimators: 1000
      learning_rate: 0.05
      num_leaves: 31
      subsample: 0.8
      colsample_bytree: 0.8
      random_state: 42
      n_jobs: -1
      class_weight: "balanced"
